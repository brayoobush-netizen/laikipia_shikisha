{% extends "layout.html" %}
{% block content %}
<section class="hero">
    <div class="hero-slide" id="slide1"></div>
    <div class="hero-slide" id="slide2"></div>

    <h2 class="bounce-text">✨ Welcome to Laikipia Shikisha ✨</h2>
    <p class="typewriter">Discover, connect, and trade with kindness 🌷</p>
    <a href="{{ url_for('sell_page') }}" class="btn glow-btn">Start Selling 🌸</a>
    <a href="{{ url_for('shop_page') }}" class="btn glow-btn">Browse Products 🌼</a>
</section>




{% endblock %}
{% block scripts %}
<script>
const images = [
    "{{ url_for('static', filename='hero-bg1.jpg') }}",
    "{{ url_for('static', filename='hero-bg2.jpg') }}",
    "{{ url_for('static', filename='hero-bg3.jpg') }}"
];

let current = 0;
const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");

// initialize first slide
slide1.style.backgroundImage = `url('${images[0]}')`;
slide1.classList.add("active");

function changeBackground() {
    const next = (current + 1) % images.length;

    // prepare slide2 with next image
    slide2.style.backgroundImage = `url('${images[next]}')`;
    slide2.classList.add("active");

    // fade out slide1 after transition
    setTimeout(() => {
        slide1.classList.remove("active");

        // swap roles
        slide1.style.backgroundImage = slide2.style.backgroundImage;
        slide1.classList.add("active");
        slide2.classList.remove("active");
        current = next;
    }, 1500); // match CSS transition duration
}

setInterval(changeBackground, 5000);
</script>
{% endblock %}
