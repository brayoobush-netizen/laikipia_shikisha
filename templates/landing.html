<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laikipia Shikisha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
  text-align: center;
  padding: 0;
  position: relative;
  height: 100vh; /* Full screen height */
  width: 100%;   /* Full width */
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: url("{{ url_for('static', filename='hero-bg3.jpg') }}") 
              no-repeat center center;
  background-size: cover; /* Ensures full fit */
  filter: blur(6px) brightness(0.7);
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  color: #fff;
  text-shadow: 0 0 10px #00f0ff;
  padding: 0 1rem; /* Prevents text cutoff on small screens */
}

@media (max-width: 768px) {
  .hero-content h1 {
    font-size: 1.8rem;
    text-align: center;
  }
  .hero-content p {
    font-size: 1rem;
    text-align: center;
  }
  .cta-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

.cta-buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 2rem;
}

.cta-buttons a {
  text-decoration: none;
  padding: 0.8rem 2rem;
  border-radius: 12px;
  font-weight: 600;
  color: #fff;
  background: rgba(255, 255, 255, 0.05); /* transparent glassy background */
  border: 2px solid #00f0ff; /* neon border */
  box-shadow: 0 0 15px #00f0ff, inset 0 0 10px rgba(0, 240, 255, 0.5);
  transition: all 0.3s ease;
  display: inline-block; /* ensures box shape */
}

.cta-buttons a:hover {
  background: rgba(255, 255, 255, 0.15); /* slightly brighter glass */
  border-color: #ff00ff; /* border shifts to pink glow */
  box-shadow: 0 0 25px #ff00ff, inset 0 0 15px rgba(255, 0, 255, 0.5);
  transform: scale(1.05);
}

.cta-buttons a:active {
  transform: scale(0.95);
  box-shadow: 0 0 10px #00f0ff, inset 0 0 5px rgba(0, 240, 255, 0.3);
}




    footer {
      margin-top: auto;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    @media (max-width: 768px) {
      .hero-content h1 {
        font-size: 2rem;
      }
      .cta-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>✨ Welcome to Laikipia Shikisha ✨</h1>
    <p>Discover, connect, and trade with kindness 🌷</p>
    <div class="cta-buttons">
      <a href="/register">Register</a>
      <a href="/login">Login</a>
    </div>
  </div>
</header>

<style>
.cta-buttons {
  display: flex;
  gap: 2rem; /* space between boxes */
  justify-content: center;
  margin-top: 2rem;
}

.cta-buttons a {
  text-decoration: none;
  padding: 1.5rem 3rem; /* bigger box feel */
  border-radius: 12px;
  font-weight: 600;
  color: #fff;
  background: #00f0ff; /* solid neon background */
  border: 2px solid #00f0ff;
  box-shadow: 0 0 15px #00f0ff;
  transition: all 0.3s ease;
  display: inline-block;
  text-align: center;
}

.cta-buttons a:hover {
  background: #ff00ff; /* hover changes to pink solid */
  border-color: #ff00ff;
  box-shadow: 0 0 25px #ff00ff;
  transform: scale(1.05);
}

.cta-buttons a:active {
  transform: scale(0.95);
  box-shadow: 0 0 10px #00f0ff;
}
</style>



  <footer>
    © 2026 Laikipia Shikisha. All rights reserved.
  </footer>
</body>
</html>
