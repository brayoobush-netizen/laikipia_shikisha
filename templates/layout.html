<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laikipia Shikisha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* 🌸 Spinning flower */
        .spin-flower {
            display: inline-block;
            animation: spin360 4s linear infinite;
        }
        @keyframes spin360 {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* 🌈 Friendly background */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc); /* lavender → soft blue */
            color: #f5f5f5;
        }

        header {
            padding: 15px;
            text-align: center;
        }
        nav a {
            margin: 0 10px;
            color: #ffebcd;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }

        /* 📌 Smart Footer */
        .smart-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 12px;
            transition: transform 0.3s ease;
            z-index: 1000;
            color: #fff;
        }
        .smart-footer.hidden {
            transform: translateY(100%);
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Company Logo" class="logo">
            <h1><span class="spin-flower">🌸</span> Laikipia Shikisha 🛍️</h1>
        </div>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('shop_page') }}">Buy</a>
            <a href="{{ url_for('sell_page') }}">Sell</a>
            <a href="{{ url_for('categories_page') }}">Categories</a>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('account_page') }}" class="account-btn">My Account</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="account-btn">Login / Sign Up</a>
            {% endif %}
        </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="smart-footer">
        <p>Made with ❤️ for Laikipia University</p>
    </footer>

    <!-- ✅ Scripts block for child templates -->
    {% block scripts %}{% endblock %}

    <!-- Scroll logic -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        let lastScrollTop = 0;
        const footer = document.querySelector(".smart-footer");

        window.addEventListener("scroll", function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            if (scrollTop > lastScrollTop) {
                // scrolling down → hide footer
                footer.classList.add("hidden");
            } else {
                // scrolling up → show footer
                footer.classList.remove("hidden");
            }

            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // avoid negative values
        }, false);
    });
    </script>
</body>
</html>
